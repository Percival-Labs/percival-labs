<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0a0e17"/>

  <!--
    V2: Ultra geometric / minimal knight helmet
    Pure angular shapes - no curves, no shield frame
    Reduced to the absolute essence: dome + visor slit + chin
    All shapes built with filled rectangles and polygons
  -->

  <!-- Helmet dome - trapezoid -->
  <polygon points="360,410 420,200 620,200 680,410"
           fill="#22d3ee"/>
  <!-- Dome inner cutout -->
  <polygon points="382,398 436,222 604,222 658,398"
           fill="#0a0e17"/>

  <!-- Visor block - main face -->
  <polygon points="340,420 700,420 680,580 640,650 400,650 360,580"
           fill="#22d3ee"/>
  <!-- Visor inner cutout -->
  <polygon points="366,434 674,434 656,566 622,630 418,630 382,566"
           fill="#0a0e17"/>

  <!-- Visor slit - bold horizontal bar -->
  <rect x="348" y="488" width="344" height="24" fill="#22d3ee"/>

  <!-- Second visor detail line -->
  <rect x="370" y="540" width="296" height="10" fill="#22d3ee"/>

  <!-- Chin V-shape -->
  <polygon points="400,660 520,780 680,660 640,660 520,748 440,660"
           fill="#22d3ee"/>

  <!-- Neck guard - angular slash -->
  <polygon points="340,500 320,600 340,680 360,680 340,600 360,500"
           fill="#22d3ee"/>

  <!-- Plume - bold angular amber triangle -->
  <polygon points="480,200 540,80 600,190"
           fill="#f59e0b"/>
  <!-- Plume accent -->
  <polygon points="530,185 570,100 610,180"
           fill="#fbbf24" opacity="0.4"/>
</svg>
