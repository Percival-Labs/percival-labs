services:
  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.registry
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - registry-data:/app/data
    environment:
      - PORT=3100
      - DB_PATH=/app/data/percival.db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  verifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.verifier
    ports:
      - "127.0.0.1:3300:3300"
    volumes:
      - registry-data:/app/data
    environment:
      - VERIFIER_PORT=3300
      - PERCIVAL_DB=/app/data/percival.db
      - VERIFIER_POLL_MS=30000
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      registry:
        condition: service_healthy

  agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - agents-data:/app/data
      - ${PL_WORKSPACE:-..}:/app/workspace:ro
      - ${ENGRAM_WORKSPACE:-../../PAIFramework}:/app/workspace-engram:ro
    environment:
      - AGENTS_PORT=3200
      - DB_PATH=/app/data/agent-memory.db
      - WORKSPACE_PATH=/app/workspace
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENTS_API_KEY=${AGENTS_API_KEY}
      - OLLAMA_URL=http://host.docker.internal:11434/v1
      - OPENCLAW_URL=http://openclaw:18789
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN}
    networks:
      - internal
      - public
      - discord
      - chaos
    deploy:
      resources:
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3200/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      registry:
        condition: service_healthy

  discord:
    build:
      context: ..
      dockerfile: docker/Dockerfile.discord
    volumes:
      - discord-data:/app/data
      - ${PL_WORKSPACE:-..}:/app/workspace:ro
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - ANTHROPIC_API_KEY=${PERCIVAL_API_KEY}
      - DB_PATH=/app/data/discord.db
      - WORKSPACE_PATH=/app/workspace
      - AGENTS_URL=http://agents:3200
      - AGENTS_API_KEY=${AGENTS_API_KEY}
    networks:
      - discord
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      agents:
        condition: service_healthy

  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      - PORT=3400
      - HOSTNAME=0.0.0.0
      - AGENTS_API_KEY=${AGENTS_API_KEY}
      - REGISTRY_URL=http://registry:3100
      - AGENTS_URL=http://agents:3200
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      registry:
        condition: service_healthy
      agents:
        condition: service_started

  terrarium:
    build:
      context: ..
      dockerfile: docker/Dockerfile.terrarium
    ports:
      - "127.0.0.1:3500:3500"
    environment:
      - PORT=3500
      - AGENTS_URL=http://agents:3200
      - AGENTS_API_KEY=${AGENTS_API_KEY}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      agents:
        condition: service_healthy

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}
      - ANTHROPIC_API_KEY=${PERCIVAL_API_KEY}
    volumes:
      - openclaw-data:/home/node/.openclaw
    networks:
      - chaos
    init: true
    restart: unless-stopped
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789", "--allow-unconfigured"]
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  roundtable-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=roundtable
      - POSTGRES_USER=percival
      - POSTGRES_PASSWORD=percival-local-dev
    volumes:
      - roundtable-pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U percival -d roundtable"]
      interval: 10s
      timeout: 5s
      retries: 5

  roundtable:
    build:
      context: ..
      dockerfile: docker/Dockerfile.roundtable
    ports:
      - "127.0.0.1:3600:3600"
    environment:
      - PORT=3600
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://percival:percival-local-dev@roundtable-db:5432/roundtable
      - ROUNDTABLE_API_URL=http://roundtable-api:3601
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      roundtable-db:
        condition: service_healthy

  roundtable-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.roundtable-api
    ports:
      - "127.0.0.1:3601:3601"
    environment:
      - PORT=3601
      - DATABASE_URL=postgresql://percival:percival-local-dev@roundtable-db:5432/roundtable
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      roundtable-db:
        condition: service_healthy

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
  discord:
    driver: bridge
    internal: true
  chaos:
    driver: bridge
    internal: true

volumes:
  registry-data:
  agents-data:
  discord-data:
  openclaw-data:
  roundtable-pgdata:
