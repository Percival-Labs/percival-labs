x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.registry
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - registry-data:/app/data
    environment:
      - PORT=3100
      - DB_PATH=/app/data/percival.db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  verifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.verifier
    ports:
      - "127.0.0.1:3300:3300"
    volumes:
      - registry-data:/app/data
    environment:
      - VERIFIER_PORT=3300
      - PERCIVAL_DB=/app/data/percival.db
      - VERIFIER_POLL_MS=30000
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      registry:
        condition: service_healthy

  agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    logging: *default-logging
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - agents-data:/app/data
      - ${PL_WORKSPACE:-..}:/app/workspace:ro
      - ${ENGRAM_WORKSPACE:-../../PAIFramework}:/app/workspace-engram:ro
    environment:
      - AGENTS_PORT=3200
      - DB_PATH=/app/data/agent-memory.db
      - WORKSPACE_PATH=/app/workspace
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENTS_API_KEY=${AGENTS_API_KEY}
      - OLLAMA_URL=http://host.docker.internal:11434/v1
      - A0_API_KEY=${A0_API_KEY}
      - A0_WORKER_URLS=http://a0-coder:80,http://a0-researcher:80,http://a0-general:80
    networks:
      - internal
      - public
      - discord
      - workforce
    deploy:
      resources:
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3200/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      registry:
        condition: service_healthy

  discord:
    build:
      context: ..
      dockerfile: docker/Dockerfile.discord
    logging: *default-logging
    volumes:
      - discord-data:/app/data
      - ${PL_WORKSPACE:-..}:/app/workspace:ro
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - ANTHROPIC_API_KEY=${PERCIVAL_API_KEY}
      - DB_PATH=/app/data/discord.db
      - WORKSPACE_PATH=/app/workspace
      - AGENTS_URL=http://agents:3200
      - AGENTS_API_KEY=${AGENTS_API_KEY}
    networks:
      - discord
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      agents:
        condition: service_healthy

  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      - PORT=3400
      - HOSTNAME=0.0.0.0
      - AGENTS_API_KEY=${AGENTS_API_KEY}
      - REGISTRY_URL=http://registry:3100
      - AGENTS_URL=http://agents:3200
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      registry:
        condition: service_healthy
      agents:
        condition: service_started

  terrarium:
    build:
      context: ..
      dockerfile: docker/Dockerfile.terrarium
    ports:
      - "127.0.0.1:3500:3500"
    environment:
      - PORT=3500
      - AGENTS_URL=http://agents:3200
      - AGENTS_API_KEY=${AGENTS_API_KEY}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      agents:
        condition: service_healthy

  a0-coder:
    image: frdel/agent-zero:latest
    logging: *default-logging
    environment:
      - A0_API_KEY=${A0_API_KEY}
      - A0_CHAT_MODEL=qwen3-coder-next
      - A0_UTILITY_MODEL=glm-4.7-flash
      - A0_EMBEDDING_MODEL=nomic-embed-text
      - A0_API_URL=http://host.docker.internal:11434
    networks:
      - workforce
      - public
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  a0-researcher:
    image: frdel/agent-zero:latest
    logging: *default-logging
    environment:
      - A0_API_KEY=${A0_API_KEY}
      - A0_CHAT_MODEL=qwen3-coder-next
      - A0_UTILITY_MODEL=glm-4.7-flash
      - A0_EMBEDDING_MODEL=nomic-embed-text
      - A0_API_URL=http://host.docker.internal:11434
    networks:
      - workforce
      - public
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  a0-general:
    image: frdel/agent-zero:latest
    logging: *default-logging
    environment:
      - A0_API_KEY=${A0_API_KEY}
      - A0_CHAT_MODEL=glm-4.7-flash
      - A0_UTILITY_MODEL=glm-4.7-flash
      - A0_EMBEDDING_MODEL=nomic-embed-text
      - A0_API_URL=http://host.docker.internal:11434
    networks:
      - workforce
      - public
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: "2"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  phoenixd:
    image: ghcr.io/acinq/phoenixd:latest
    volumes:
      - phoenixd-data:/phoenix/.phoenix
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9740/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  lnbits:
    image: lnbits/lnbits:latest
    # Admin UI accessible only via localhost — NEVER expose to public network
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - lnbits-data:/app/data
    environment:
      - LNBITS_BACKEND_WALLET_CLASS=PhoenixdWallet
      - PHOENIXD_API_ENDPOINT=http://phoenixd:9740
      - PHOENIXD_API_PASSWORD=${PHOENIXD_API_PASSWORD}
      - LNBITS_ADMIN_UI=true
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      phoenixd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  vouch-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=vouch
      - POSTGRES_USER=percival
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-percival-local-dev}
    volumes:
      - vouch-pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U percival -d vouch"]
      interval: 10s
      timeout: 5s
      retries: 5

  vouch:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vouch
    ports:
      - "127.0.0.1:3600:3600"
    environment:
      - PORT=3600
      - HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - DATABASE_URL=postgresql://percival:${POSTGRES_PASSWORD:-percival-local-dev}@vouch-db:5432/vouch
      - VOUCH_API_URL=http://vouch-api:3601
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      vouch-db:
        condition: service_healthy

  vouch-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vouch-api
    ports:
      - "127.0.0.1:3601:3601"
    environment:
      - PORT=3601
      - NODE_ENV=production
      - DATABASE_URL=postgresql://percival:${POSTGRES_PASSWORD:-percival-local-dev}@vouch-db:5432/vouch
      - BASE_RPC_URL=${BASE_RPC_URL:-https://mainnet.base.org}
      - BASE_SEPOLIA_RPC_URL=${BASE_SEPOLIA_RPC_URL:-https://sepolia.base.org}
      - LNBITS_URL=http://lnbits:5000
      - LNBITS_ADMIN_KEY=${LNBITS_ADMIN_KEY}
      - LNBITS_SUPER_USER=${LNBITS_SUPER_USER}
      - LNBITS_WEBHOOK_SECRET=${LNBITS_WEBHOOK_SECRET}
      - VOUCH_WEBHOOK_BASE_URL=http://vouch-api:3601
      - TREASURY_LNBITS_WALLET_ID=${TREASURY_LNBITS_WALLET_ID}
      - TREASURY_LNBITS_ADMIN_KEY=${TREASURY_LNBITS_ADMIN_KEY}
      - TREASURY_LNBITS_INVOICE_KEY=${TREASURY_LNBITS_INVOICE_KEY}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      vouch-db:
        condition: service_healthy
      lnbits:
        condition: service_healthy

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true
  discord:
    driver: bridge
    internal: true
  workforce:
    driver: bridge
    internal: true

volumes:
  registry-data:
  agents-data:
  discord-data:
  vouch-pgdata:
  phoenixd-data:
  lnbits-data:
