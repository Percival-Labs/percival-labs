services:
  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.registry
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - registry-data:/app/data
    environment:
      - PORT=3100
      - DB_PATH=/app/data/percival.db
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  verifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.verifier
    ports:
      - "127.0.0.1:3300:3300"
    volumes:
      - registry-data:/app/data
    environment:
      - VERIFIER_PORT=3300
      - PERCIVAL_DB=/app/data/percival.db
      - VERIFIER_POLL_MS=30000
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      registry:
        condition: service_healthy

  agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - agents-data:/app/data
    environment:
      - AGENTS_PORT=3200
      - DB_PATH=/app/data/agent-memory.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENTS_API_KEY=${AGENTS_API_KEY}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 16G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3200/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      registry:
        condition: service_healthy

  # web: (deprecated — replaced by website service)
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.web
  #   ports:
  #     - "127.0.0.1:3400:3400"

  website:
    build:
      context: ..
      dockerfile: docker/Dockerfile.website
    ports:
      - "127.0.0.1:3400:3400"
    environment:
      - PORT=3400
      - AGENTS_API_KEY=${AGENTS_API_KEY}
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      registry:
        condition: service_healthy
      agents:
        condition: service_started

  roundtable-db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_DB=roundtable
      - POSTGRES_USER=percival
      - POSTGRES_PASSWORD=percival-local-dev
    volumes:
      - roundtable-pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U percival -d roundtable"]
      interval: 10s
      timeout: 5s
      retries: 5

  roundtable:
    build:
      context: ..
      dockerfile: docker/Dockerfile.roundtable
    ports:
      - "127.0.0.1:3600:3600"
    environment:
      - PORT=3600
      - DATABASE_URL=postgresql://percival:percival-local-dev@roundtable-db:5432/roundtable
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      roundtable-db:
        condition: service_healthy

  roundtable-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.roundtable-api
    ports:
      - "127.0.0.1:3601:3601"
    environment:
      - PORT=3601
      - DATABASE_URL=postgresql://percival:percival-local-dev@roundtable-db:5432/roundtable
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      roundtable-db:
        condition: service_healthy

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  registry-data:
  agents-data:
  roundtable-pgdata:
