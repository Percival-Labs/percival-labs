services:
  registry:
    build:
      context: ..
      dockerfile: docker/Dockerfile.registry
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - percival-data:/app/data
    environment:
      - PORT=3100
      - DB_PATH=/app/data/percival.db
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  verifier:
    build:
      context: ..
      dockerfile: docker/Dockerfile.registry
    command: ["echo", "Verifier placeholder — pipeline implementation in Phase 2"]
    deploy:
      resources:
        limits:
          memory: 8G

  agents:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    ports:
      - "127.0.0.1:3200:3200"
    volumes:
      - percival-data:/app/data
    environment:
      - AGENTS_PORT=3200
      - DB_PATH=/app/data/agent-memory.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    deploy:
      resources:
        limits:
          memory: 16G
    depends_on:
      registry:
        condition: service_healthy

volumes:
  percival-data:
